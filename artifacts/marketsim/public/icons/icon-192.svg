<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="192" height="192" rx="40" fill="#06040f"/>
  <rect width="192" height="192" rx="40" fill="url(#bg_grad)"/>
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#06040f"/>
    </linearGradient>
    <linearGradient id="bolt_grad" x1="76" y1="36" x2="116" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="78" stroke="url(#bolt_grad)" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
  <!-- Lightning bolt -->
  <path d="M108 36L72 102H96L84 156L128 84H104L108 36Z"
        fill="url(#bolt_grad)" filter="url(#glow)" opacity="0.95"/>
  <!-- Glow dot -->
  <circle cx="96" cy="96" r="6" fill="#a78bfa" opacity="0.5"/>
</svg>
